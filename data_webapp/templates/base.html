<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title> {% block title %}SALISU MAHADI DATA{% endblock %}</title>

        <!--boostrap css-->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.main.css" rel="stylesheet">
        <!--boostrap icons-->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">

        <style>
            body {
                background-color: #000005;
                color: white;
                padding-bottom: 70px;
            }
            .navbar-brand {
                color: white !important;
                font-weight: bold;
            }
            .navbar-brand span {
                color: #ffc107;
            }
            .top-navbar {
                background-color: #0d0dd7;
                padding: 30px;
            }
            .bottom-nav {
                position: fixed;
                bottom: 0;
                width: 100%;
                background-color: rgb(40, 8, 156);
                border-top: 1px solid rgb(19, 6, 6);
                display: flex;
                justify-content: space-around;
                padding: 10px 0;
                z-index: 999;
            }
            .bottom-nav a {
                text-decoration: none;
                color: #999;
                font-size: 12px;
                display: flex;
                flex-direction: column;
                align-items: center;
            }
            .bottom-nav a.active {
                color: #1a1aff;
            }
            .bottom-nav i {
                font-size: 20px;
            }
            .card {
                border-radius: 15px;
                border: none;
            }

            .profile-avater {
                width: 80px;
                height: 80px;
                font-size: 2.5cm;
            }
        </style>
    </head>
    <body>

        <!--top narbar-->
        <nav class="top-navbar d-flex justify-content-between align-iterms-center">
            <span class="navbar-brand">SALISU <span>MAHADI</span> DATA</span>
            {% if user.is_authenticated %}
            <a href="{% url 'logout' %}" class="btn btn-sm btn-outline-ligth">Logout</a>
            {% else %}
            <a href="{% url 'login' %}" class="btn btn-sm btn-outline-ligth">Login</a>
            {% endif %}
        </nav>

        <!--page content-->
        <div class="container mt-3">
            {% block content %}
            {% endblock content %}
        </div>

        <!--bottom navigation-->
        {% if user.is_authenticated %}
        <div class="bottom-nav">
            <a href="{% url 'dashboard' %}">
                <i class="bi bi-house-fill"></i>
                <span>Home</span>
            </a>
            <a href="{% url 'buy_data' %}">
                <i class="bi bi-bar-chart-fill"></i>
                <span>Data</span>
            </a>
            <a href="{% url 'transaction_history' %}">
                <i class="bi bi-house-fill"></i>
                <span>History</span>
            </a>
            <a href="{% url 'profile' %}">
                <i class="bi bi-person-fill"></i>
                <span>Profile</span>
            </a>
        </div>
        {% endif %}

        <!--boostrap js-->
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.main.js"></script>
    </body>
</html>
