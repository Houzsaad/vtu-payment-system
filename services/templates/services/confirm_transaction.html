{% extends 'base.html' %}
{% block content %}

<div class="d-flex align-items-center mb-3">
    <a href="{% url 'dashboard' %}" class="text-white me-2">
        <i class="bi bi-arrow-left fs-5"></i>
    </a>
    <h5 class="fw-bold text-white mb-0">Confirm Transaction</h5>
</div>

{% if error %}
<div class="alert alert-danger">{{ error }}</div>
{% endif %}

<!--Transaction Summary-->
<div class="card p-3">
    <h6 class="fw-bold mb-3 text-muted">Transaction Summary</h6>

    <div class="d-flex justify-content-between py-2 border-bottom">
        <span class="text-muted">Service:</span>
        <span class="fw-bold">{{ pending.service }}</span>
    </div>

    <div class="d-flex justify-content-between py-2 border-bottom">
        <span class="text-muted">Network:</span>
        <span class="fw-bold">{{ pending.network }}</span>
    </div>

    <div class="d-flex justify-content-between py-2 border-bottom">
        <span class="text-muted">Phone Number:</span>
        <span class="fw-bold">{{ pending.phone }}</span>
    </div>

    <div class="d-flex justify-content-between py-2 border-bottom">
        <span class="text-muted">Amount:</span>
        <span class="fw-bold">₦{{ pending.amount }}</span>
    </div>
</div>

<div class="card p-3">

    <form method="POST">
      {% csrf_token %}
        <div class="card mb-3">
            <label class="form-label fw-bold">Enter Transaction PIN</label>
            <input
                type="password" 
                name="pin" 
                placeholder="Enter PIN"
                maxlength="4"
                pattern="\d{4}"
                inputmode="numeric"
                required
            >
        </div>
        <button type="submit" class="btn btn-primary w-100 py-2 fw-bold">
            Confirm & Pay
        </button>
        <a href="{% url 'dashboard' %}" class="btn btn-outline-secondary w-100 mt-5">Back</a>
    </form>
</div>

{% endblock %}
